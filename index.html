function genComments(seedStr, n) {
    const r = mkRng(seedOf(seedStr));
    const out = [];
    for (let i = 0; i < n; i++) {
        const name = CMT_NAMES[Math.floor(r() * CMT_NAMES.length)];
        const x = CMT_POOL[Math.floor(r() * CMT_POOL.length)];

        out.push({ u: name, x: x, l: l, hot: l > 130 });
    }
    return out;
}
